<body>

  <button id="theme-toggle">☀️ 라이트모드</button>

  <div class="wrapper">
    <nav class="site-nav">
      <a href="index.html">🏠 홈</a>
      <a href="index.html">🍀 로또</a>
      <a href="meal.html" class="active">🍽️ 식사</a>
    </nav>

    <header>
      <h1>🍽️ 식사 추천</h1>
      <p class="subtitle">오늘 뭐 먹을지 고민된다면? 버튼을 눌러보세요</p>
    </header>

    <div class="info-box">
      <strong>이용 방법:</strong> 카테고리를 선택해 원하는 종류를 좁힌 뒤 '추천받기' 버튼을 누르세요. 50가지 이상의 메뉴 중 오늘의 <strong>1등·2등·3등</strong> 식사를 추천해 드립니다. 마음에 드는 추천 결과는 저장 목록에 보관해 두었다가 언제든 다시 볼 수 있습니다.
    </div>

    <!-- 카테고리 필터 -->
    <div class="category-bar">
      <button class="cat-btn active" data-cat="전체">전체</button>
      <button class="cat-btn" data-cat="한식">🇰🇷 한식</button>
      <button class="cat-btn" data-cat="중식">🥢 중식</button>
      <button class="cat-btn" data-cat="일식">🍣 일식</button>
      <button class="cat-btn" data-cat="양식">🍝 양식</button>
      <button class="cat-btn" data-cat="분식">🌮 분식</button>
      <button class="cat-btn" data-cat="기타">🍗 기타</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="recommend">식사 추천</button>
      <button class="tab" data-tab="saved">저장 목록</button>
    </div>

    <!-- 식사 추천 탭 -->
    <div id="tab-recommend" class="tab-content active">
      <div id="meals-container"></div>
      <div class="actions">
        <button id="pick-btn">🎲 추천받기</button>
        <button id="save-btn" style="display:none">💾 저장하기</button>
      </div>
    </div>

    <!-- 저장 목록 탭 -->
    <div id="tab-saved" class="tab-content">
      <div id="saved-container">
        <p class="empty-msg">저장된 추천이 없습니다.</p>
      </div>
      <div class="actions">
        <button id="clear-btn">🗑️ 전체 삭제</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="about.html">서비스 소개</a>
      <a href="privacy.html">개인정보처리방침</a>
