  <meta name="description" content="럭키픽에서 무료로 로또 번호를 추천받으세요. Fisher-Yates 알고리즘으로 편향 없이 5게임을 한 번에 생성하고, 보너스 번호까지 확인할 수 있습니다.">
  <meta property="og:title" content="로또 번호 추천 | 럭키픽">
  <meta property="og:description" content="무료 로또 번호 추천 서비스. 5게임을 한 번에 생성, 저장 목록 지원.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<body>

  <button id="theme-toggle">☀️ 라이트모드</button>

  <div class="wrapper">
    <nav class="site-nav">
      <a href="index.html">🏠 홈</a>
      <a href="lotto.html" class="active">🍀 로또</a>
      <a href="meal.html">🍽️ 식사</a>
    </nav>

    <header>
      <h1>🍀 로또 번호 추천</h1>
      <p class="subtitle">버튼을 눌러 5게임을 한꺼번에 추천받아보세요</p>
    </header>

    <div class="info-box">
      <strong>이용 방법:</strong> 아래 '번호 생성' 버튼을 누르면 1~45번 사이의 숫자 중 무작위로 6개 번호와 보너스 번호를 추첨합니다. 한 번에 5게임이 생성되며, 마음에 드는 조합은 '저장하기'로 보관해 두었다가 '저장 목록' 탭에서 언제든 다시 확인할 수 있습니다.
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="generate">번호 추천</button>
      <button class="tab" data-tab="saved">저장 목록</button>
    </div>

    <!-- 번호 추천 탭 -->
    <div id="tab-generate" class="tab-content active">
      <div id="games-container"></div>
      <div class="actions">
        <button id="pick-btn">🎲 번호 생성</button>
        <button id="save-btn" style="display:none">💾 저장하기</button>
      </div>
    </div>

    <!-- 저장 목록 탭 -->
    <div id="tab-saved" class="tab-content">
      <div id="saved-container">
        <p class="empty-msg">저장된 번호가 없습니다.</p>
      </div>
      <div class="actions">
        <button id="clear-btn">🗑️ 전체 삭제</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-links">

      <a href="privacy.html">개인정보처리방침</a>

    </div>

  </footer>

  <script src="common.js"></script>
  <script src="lotto.js"></script>
</body>
</html>
