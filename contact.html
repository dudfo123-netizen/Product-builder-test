<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의 | 럭키픽 (LuckyPick)</title>
  <meta name="description" content="럭키픽(LuckyPick)과의 광고 제휴, 콘텐츠 협업, 기술 파트너십 등 다양한 제휴 문의를 받고 있습니다. 양식을 작성해 주시면 빠르게 답변 드리겠습니다.">
  <meta property="og:title" content="제휴 문의 | 럭키픽">
  <meta property="og:description" content="럭키픽과 함께할 파트너를 찾습니다. 광고·콘텐츠·기술 제휴 문의를 받습니다.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link href="common.css" rel="stylesheet">
  <link href="contact.css" rel="stylesheet">
</head>
<body>

  <button id="theme-toggle">☀️ 라이트모드</button>

  <div class="wrapper">
    <nav class="site-nav">
      <a href="index.html">🏠 홈</a>
      <a href="index.html">🍀 로또</a>
      <a href="meal.html">🍽️ 식사</a>
    </nav>

    <header>
      <h1>📩 제휴 문의</h1>
      <p class="subtitle">함께 성장할 파트너를 찾고 있습니다. 편하게 문의해 주세요.</p>
    </header>

    <div class="contact-card">
      <form id="contact-form" action="https://formspree.io/f/mnjgbzqa" method="POST">

        <div class="form-group">
          <label for="company">회사 / 단체명 <span class="required">*</span></label>
          <input type="text" id="company" name="company" placeholder="회사 또는 단체명을 입력하세요" required>
        </div>

        <div class="form-group">
          <label for="name">담당자 이름 <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
        </div>

        <div class="form-group">
          <label for="email">이메일 <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@company.com" required>
        </div>

        <div class="form-group">
          <label for="phone">연락처</label>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
        </div>

        <div class="form-group">
          <label for="category">문의 유형 <span class="required">*</span></label>
          <select id="category" name="category" required>
            <option value="" disabled selected>문의 유형을 선택하세요</option>
            <option value="광고 제휴">광고 제휴</option>
            <option value="콘텐츠 협업">콘텐츠 협업</option>
            <option value="기술 파트너십">기술 파트너십</option>
            <option value="투자 / 인수">투자 / 인수</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">문의 내용 <span class="required">*</span></label>
          <textarea id="message" name="message" rows="5" placeholder="제휴 목적, 규모, 희망 일정 등을 자유롭게 작성해 주세요." required></textarea>
        </div>

        <button type="submit" id="submit-btn">✉️ 문의 보내기</button>

      </form>

      <div id="success-msg" class="success-msg" style="display:none">
        <div class="success-icon">🎉</div>
        <h2>문의가 접수되었습니다!</h2>
        <p>빠른 시일 내에 이메일로 답변 드리겠습니다.</p>
        <button onclick="resetForm()">다시 문의하기</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="about.html">서비스 소개</a>
      <a href="privacy.html">개인정보처리방침</a>
      <a href="contact.html" class="active">제휴 문의</a>
    </div>
    <p class="footer-copy">© 2026 LuckyPick. All rights reserved.</p>
  </footer>

  <script src="common.js"></script>
  <script src="contact.js"></script>
</body>
</html>
